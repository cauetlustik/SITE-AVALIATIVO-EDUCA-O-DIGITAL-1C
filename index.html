<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSphere | Sustentabilidade Urbana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header role="banner">
        <nav class="container" aria-label="Navegação Principal">
            <div class="logo">EcoSphere</div>
            <div class="accessibility-controls">
                <button id="increase-font" aria-label="Aumentar fonte">A+</button>
                <button id="decrease-font" aria-label="Diminuir fonte">A-</button>
                <button id="toggle-contrast" aria-label="Alternar alto contraste">🌓</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero" aria-labelledby="hero-title">
            <div class="carousel" id="main-carousel">
                </div>
        </section>

        <section id="services" class="container reveal">
            <h2 id="services-title">Nossos Serviços</h2>
            <div class="grid-layout" id="services-grid">
                </div>
        </section>

        <section id="faq" class="container reveal">
            <h2>Dúvidas Frequentes</h2>
            <div id="faq-accordion">
                </div>
        </section>
    </main>

    <footer role="contentinfo">
        <p>&copy; 2024 EcoSphere. Design focado em acessibilidade.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
